<!DOCTYPE html>
<html lang="en">
<head>
    <title>登录</title>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>

    <style>
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
    </style>
    <script src="/scripts/boot.js" type="text/javascript"></script>
</head>
<body>
<div id="loginWindow" class="mini-window" title="用户登录" style="width:350px;height:165px;"
     showModal="true" showCloseButton="false">

    <div id="loginForm" style="padding:15px;padding-top:10px;">
        <table>
            <tr>
                <td style="width:60px;"><label for="account">帐号：</label></td>
                <td>
                    <input id="account" name="account" onvalidation="onUserNameValidation" class="mini-textbox"
                           required="true" style="width:150px;"/>
                </td>
            </tr>
            <tr>
                <td style="width:60px;"><label for="password">密码：</label></td>
                <td>
                    <input id="password" name="password" onvalidation="onPwdValidation" class="mini-password"
                           requiredErrorText="密码不能为空" required="true" style="width:150px;"
                           onenter="onLoginClick"/>
                    &nbsp;&nbsp;<a href="#">忘记密码</a>
                </td>
            </tr>
            <tr>
                <td></td>
                <td style="padding-top:5px;">
                    <a onclick="onLoginClick" class="mini-button" style="width:60px;">登录</a>
                    <a onclick="onResetClick" class="mini-button" style="width:60px;">重置</a>
                </td>
            </tr>
        </table>
    </div>
</div>
<script type="text/javascript">
    mini.parse();
    var loginWindow = mini.get("loginWindow");
    loginWindow.show();

    function login(user, success) {  // 账号和密码
        jQuery.ajax({
            url: "/login",
            method: "post",
            data: user,
            dataType: "json",
            success
        })
    }

    function onLoginClick(e) {
        var form = new mini.Form("#loginWindow");

        form.validate();
        if (form.isValid() == false) return;

        loginWindow.hide();
        mini.loading("登录中，马上转到系统...", "登录成功");
        let user = form.getData();
        setTimeout(function () {
            // 登录
            login(user, function (data) {
                if (data.success) {
                    // 登录成功
                    window.location = "/view/main";
                } else {
                    alert(data.message);
                    // 登录失败
                    window.location = "/";
                }
            })
        }, 1500);
    }

    function onResetClick(e) {
        var form = new mini.Form("#loginWindow");
        form.clear();
    }

    function onUserNameValidation(e) {
        if (e.isValid) {
            if (e.isValid) {
                if (e.value.length < 4) {
                    e.errorText = "账号不能少于4个字符";
                    e.isValid = false;
                }
            }
        }
    }

    function onPwdValidation(e) {
        if (e.isValid) {
            if (e.value.length < 4) {
                e.errorText = "密码不能少于4个字符";
                e.isValid = false;
            }
        }
    }


</script>
</body>
</html>
