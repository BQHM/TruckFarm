<!DOCTYPE html>
<html lang="zh-CN">

            color: #2f3b2f;
        }

        .placeholder {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 520px;
            padding: 36px 40px;

            border-top: 5px solid #5a8f4d;
            text-align: center;
        }

        .title {
            margin: 0 0 12px;
            font-size: 24px;
            font-weight: 600;
        }

        .desc {
            margin: 0;
            color: #6b756b;
            line-height: 1.8;
            font-size: 14px;
        }

</head>
<body>
<div class="placeholder">
    <div class="card">
        <h1 class="title">功能建设中</h1>
        <p class="desc">
            这是旧版 TruckFarm 的临时占位页面。<br>
            当前菜单项在原毕业设计中尚未实现，后续会在新技术栈迭代中补齐。
        </p>

</html>
