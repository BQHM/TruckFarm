<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      border: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
  <script src="/scripts/boot.js" type="text/javascript"></script>
</head>
<body>


<div class="mini-fit">
  <div id="department-list" class="mini-datagrid" style="width:100%;height:100%;"
       url="/department/list"
       sizeList="[5,10,20]"
       pageIndex="1"
       pageSize="5"
       idField="departmentId"
       sortField="department_id"
       sortOrder="asc"
       ajaxOptions="{dataType:'json',method:'get'}">
    <div property="columns" >
      <div field="departmentId" sortField="department_id" width="100" headerAlign="center" allowSort="true">部门编号</div>

      <div field="departmentName" width="120" headerAlign="center" >部门名称</div>

      <div field="count" sortField="count" width="120" headerAlign="center" allowSort="true">部门人数</div>

      <div field="fund" sortField="fund" width="120" headerAlign="center" allowSort="true">部门资金</div>
    </div>
  </div>
</div>
<script>
  // 加载员工信息
  mini.parse();
  let grid = mini.get("department-list");
  grid.load(); // 发起 ajax 请求

</script>


</body>
</html>
