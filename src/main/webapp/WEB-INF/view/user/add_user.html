<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>新增员工</title>
    <style>
        html, body {
            padding: 0;
            margin: 0;
            border: 0;
            height: 100%;
            overflow: hidden;
        }
    </style>
    <script src="/scripts/boot.js" type="text/javascript"></script>
</head>
<body>
<form id="add-user" method="post">
    <!--    <input name="id" class="mini-hidden"/>-->
    <div style="padding-left:11px;padding-bottom:5px; padding-top: 30px;">
        <table style="table-layout:fixed;">
            <tr>
                <td style="width:120px;">员工账号：</td>
                <td style="width:200px;">
                    <input name="account" class="mini-textbox" required="true" emptyText="请输入员工账号"/>
                </td>
            </tr>
            <tr>
                <td style="width:120px;">账号密码：</td>
                <td style="width:200px;">
                    <input name="password" class="mini-textbox" required="true" emptyText="请输入账号密码"/>
                </td>
            </tr>
            <tr>
                <td style="width:120px;">员工姓名：</td>
                <td style="width:200px;">
                    <input name="userName" class="mini-textbox" required="true" emptyText="请输入员工姓名"/>
                </td>
            </tr>
            <tr>
                <td style="width:120px;">联系方式：</td>
                <td style="width:200px;">
                    <input name="phone" class="mini-textbox" required="true" emptyText="请输入联系方式"/>
                </td>
            </tr>
            <tr>
                <td style="width:120px;">所属部门：</td>
                <td style="width:200px;">
                    <input name="departmentName" required="true" type="text" class="mini-combobox" style="width:150px;"
                           textField="departmentName"
                           valueField="departmentName"
                           url="/user/department"
                    >
                </td>
            </tr>
            <tr>
                <td style="width:120px;">账号权限：</td>
                <td style="width:200px;">
                    <input name="roleName" required="true" type="text" class="mini-combobox" style="width:150px;"
                           textField="roleName"
                           valueField="roleName"
                           url="/user/role"
                    >
                </td>
            </tr>
        </table>
    </div>
    <div style="text-align:center;padding:10px;">
        <a class="mini-button" onclick="onOk()" style="width:60px;margin-right:20px;">确定</a>
        <a class="mini-button" onclick="onCancel()" style="width:60px;">取消</a>
    </div>
</form>
<script>

    function onOk() {
        let form = new mini.Form("add-user");
        // 获取数据
        let data = form.getData();
        // 校验数据
        form.validate();
        if (!form.isValid()) return;
        // 发送请求
        jQuery.ajax({
            url: "/user/save",
            method: "post",
            data: data,
            dataType: "json",
            success(data) {
                if (data.success) {
                    closeWindow()
                } else {
                    alert(data.message);
                }
            }
        })
    }

    function onCancel() {
        closeWindow();
    }

    function closeWindow() {
        if (window.CloseOwnerWindow) return window.CloseOwnerWindow();
        else window.close();
    }

</script>

</body>
</html>
